site_name: aioq
site_description: Async job queue for Python with multiple backends and a built-in dashboard
site_url: https://ykus4.github.io/aioq
repo_url: https://github.com/ykus4/aioq
repo_name: ykus4/aioq
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Defining Tasks: guide/tasks.md
    - Enqueueing Jobs: guide/enqueueing.md
    - Running Workers: guide/workers.md
    - Cron Scheduling: guide/cron.md
    - Dashboard: guide/dashboard.md
  - Backends:
    - Redis: backends/redis.md
    - PostgreSQL: backends/postgres.md
    - Custom Backend: backends/custom.md
  - API Reference:
    - Aarq: reference/aarq.md
    - Job & JobStatus: reference/models.md
    - TaskDef: reference/taskdef.md
    - BaseBroker: reference/broker.md
    - Worker: reference/worker.md

plugins:
  - search
